<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Copilot Hub Full Icon Set</title>
<style>
:root { color-scheme: dark; --night:#0B1117; --line:#243040; --text:#EAF6FF; --muted:#96A7BB; }
* { box-sizing: border-box; }
body { margin: 0; padding: 48px; background: radial-gradient(circle at 70% 20%, #142235, var(--night) 55%); font-family: Inter, Segoe UI, Arial, sans-serif; color: var(--text); }
h1 { margin: 0 0 8px; font-size: 32px; letter-spacing: -0.03em; }
p { margin: 0 0 32px; color: var(--muted); }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 24px; max-width: 1120px; }
.card { display: grid; place-items: center; gap: 12px; min-height: 184px; padding: 20px; border: 1px solid var(--line); border-radius: 24px; background: rgba(255,255,255,0.025); }
.card img { width: 112px; height: 112px; }
.card span { color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<h1>Copilot Hub Full Icon Set</h1>
<p>Gradient SVG module icons generated from the supplied Copilot Hub mark.</p>
<div class="grid">
<div class="card"><img src="svg/gradient/copilot-hub-hub.svg" alt="Hub icon"><span>Hub</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-agents.svg" alt="Agents icon"><span>Agents</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-create.svg" alt="Create icon"><span>Create</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-explore.svg" alt="Explore icon"><span>Explore</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-chat.svg" alt="Chat icon"><span>Chat</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-analytics.svg" alt="Analytics icon"><span>Analytics</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-automations.svg" alt="Automations icon"><span>Automations</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-integrations.svg" alt="Integrations icon"><span>Integrations</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-knowledge.svg" alt="Knowledge icon"><span>Knowledge</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-tools.svg" alt="Tools icon"><span>Tools</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-settings.svg" alt="Settings icon"><span>Settings</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-security.svg" alt="Security icon"><span>Security</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-users.svg" alt="Users icon"><span>Users</span></div>
<div class="card"><img src="svg/gradient/copilot-hub-notifications.svg" alt="Notifications icon"><span>Notifications</span></div>
</div>
</body>
</html>
